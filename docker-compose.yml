version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whvac-portal
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - whvac_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  whvac_data:
    driver: local
